<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SmartFinanceAI</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- Theme sync: login/register are outside base.html's sidebar/navbar layout,
     but still respect the globally saved theme preference. -->
<script>
(function(){
    try{
        if(localStorage.getItem('sfai-theme') === 'light'){
            document.documentElement.classList.add('light-mode');
            document.body.classList.add('light-mode');
        }
    }catch(e){}
})();
</script>

<div class="auth-container">

    <h1 style="color:var(--text); font-size:1.6rem;">
        <i class="bi bi-person-plus-fill" style="color:var(--mint);"></i> Register
    </h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    {% for category, message in messages %}
    <div class="alert alert-{{ 'success' if category == 'success' else 'danger' }}">
        {{ message }}
    </div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    <form method="POST">

        <input
            type="text"
            name="name"
            placeholder="Enter Name"
            required
        >

        <input
            type="email"
            name="email"
            placeholder="Enter Email"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Enter Password"
            required
        >

        <button type="submit">
            Register
        </button>

    </form>

    <br>

    <a href="/" class="auth-link">
        Back to Login
    </a>

</div>

</body>
</html>
